<!DOCTYPE html>
<html>
  <head>
    <meta http-equiv="refresh" content="0;url=http://www.mebasar.com">
    <title>Redirecting to mebasar.com</title>

    <script src='randomColor.js'></script>

    <style>
       body {
           background-repeat: repeat;
       }
       .modal {
            display: none; /* Hidden by default */
            position: fixed; /* Stay in place */
            z-index: 1; /* Sit on top */
            padding-top: 100px; /* Location of the box */
            left: 0;
            top: 0;
            width: 100%; /* Full width */
            height: 100%; /* Full height */
            overflow: auto; /* Enable scroll if needed */
            background-color: rgb(0,0,0); /* Fallback color */
            background-color: rgba(0,0,0,0.3); /* Black w/ opacity */
        }

        /* Modal Content */
        .modal-content {
            background-color: #fefefe;
            margin: auto;
            padding: 20px;
            border: 1px solid #888;
            width: 35%;
            text-align: center;
            font-size: 1.8em;
            font-family: Baskerville, "Baskerville Old Face", "Goudy Old Style", Garamond, "Times New Roman", serif;
        }
    </style>

  </head>
  <body>

   <div id="myModal" class="modal">
      <div class="modal-content" id='model-content'>
        <p>Redirecting...</p>
      </div>
    </div>

    <script>

    var gifs = ['ellipsis-60','ring-90','ripple','balls-90','triangle-80']
    var loadingimg = gifs[Math.floor(Math.random() * gifs.length)];

    document.body.style.backgroundImage = "url('img/"+loadingimg+".svg')";

    document.body.style.backgroundColor = randomColor({
                                             luminosity: 'dark',
                                             format: 'rgba',
                                             alpha: 0.5
                                          });;

    document.getElementById('myModal').style.display = "block";

    </script>

  </body>
</html>
